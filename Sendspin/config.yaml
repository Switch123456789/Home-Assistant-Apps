slug: "sendspin"
name: "Sendspin"
description: "Play back music through audio interfaces, that are connected to Home Assistants host-system"
version: "0.45"
stage: "experimental"
startup: services
init: false

host_network: true
audio: true
realtime: true

arch:
  - aarch64
  - amd64

map:
  - addon_config:rw

schema:
  bool_boost_volume: bool?
  str_name: str?
  str_id: str?
  str_url: str?
  str_log_level: list(DEBUG|INFO|WARNING|ERROR|CRITICAL)?